name: Integracion Continua - Practica 4

on:
  push:
    branches:
      - main

jobs:
  build-test-analyze-publish:
    name: Compilacion, Pruebas, Calidad y Publicacion
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout del codigo (Git)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Necesario para el analisis profundo de SonarCloud

      - name: 2. Configurar el entorno Java (JDK 21)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: 3. Compilar y ejecutar pruebas unitarias (Maven)
        run: mvn clean package

      - name: 4. Analisis Estatico de Calidad (SonarCloud)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=juangabrielsuch_servicio-musica-ci

      - name: 5. Publicacion del artefacto
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: servicio-musica-artefacto
          path: target/*.jar
          retention-days: 7
